services:
  - type: web
    name: deepfake-detector
    runtime: python
    python:
      version: "3.10"
    buildCommand: |
      pip install -r requirements.txt
      python -c "import torch; print(torch.__version__)"  # Verify Torch install
    startCommand: "gunicorn --workers 1 --threads 2 --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: PORT
        value: "10000"  # Override if needed
    disk:
      name: model_storage
      mountPath: /opt/render/project/src/models/
      sizeGB: 1