services:
  - type: web
    name: deepfake-detector
    runtime: python
    python:
      version: "3.10"
    buildCommand: |
      pip install -r requirements.txt
      python -c "import torch; print(torch.__version__)"
    startCommand: "gunicorn --workers 1 --threads 1 --timeout 120 --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: PORT
        value: "10000"
    plan: free # Change to "standard" if you need more resources
    disk:
      name: model_storage
      mountPath: /opt/render/project/src/models/
      sizeGB: 2 # Increased from 1GB