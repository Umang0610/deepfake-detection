<!DOCTYPE html>
<html>
<head>
  <title>Deepfake Detection Hub</title>
  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(to bottom right, #1a1a2e, #16213e, #0f3460);
      color: #f1f1f1;
      padding: 20px;
    }
    
    h1 {
      color: #00d4ff;
      text-align: center;
      margin-bottom: 30px;
    }
    
    .detector-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .detector-section {
      background: rgba(33, 42, 62, 0.8);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .detector-section h2 {
      color: #00d4ff;
      margin-bottom: 15px;
      text-align: center;
    }
    
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.7);
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0, 212, 255, 0.3);
      border-radius: 50%;
      border-top-color: #00d4ff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Deepfake Detection Dashboard</h1>
  
  <div class="detector-container">
    <div class="detector-section">
      <h2>Image Detection</h2>
      <iframe src="/image-app" id="image-frame"></iframe>
    </div>
    
    <div class="detector-section">
      <h2>Audio Detection</h2>
      <iframe src="/audio-app" id="audio-frame"></iframe>
    </div>
    
    <div class="detector-section">
      <h2>Video Detection</h2>
      <iframe src="/video-app" id="video-frame"></iframe>
    </div>
  </div>

  <script>
    document.querySelectorAll('iframe').forEach(frame => {
      frame.onload = function() {
        frame.style.backgroundColor = 'transparent';
      };
      frame.style.backgroundColor = 'rgba(15, 23, 42, 0.7)';
    });
  </script>
</body>
</html>
